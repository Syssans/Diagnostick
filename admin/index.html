<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Admin (Bébouland)</title>
<style>
:root {
  --bg: #0f0f0d;
  --bg2: #181816;
  --bg3: #222220;
  --text: #f0efe8;
  --muted: #888780;
  --faint: #3a3a38;
  --accent: #fff;
  --accent-dim: rgba(200,185,122,0.12);
  --accent-border: rgba(200,185,122,0.3);
  --danger: #e05c5c;
  --danger-dim: rgba(224,92,92,0.12);
  --success: #6ab04c;
  --success-dim: rgba(106,176,76,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "DM Sans"; background: var(--bg); color: var(--text); min-height: 100vh; background-image: url("./singelol.jpg");}

#login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
.login-card { width: 100%; max-width: 360px; text-align: center; }
.login-logo { font-size: 13px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 2rem; font-family: system-ui, sans-serif; }
.login-title { font-size: 22px; font-weight: normal; margin-bottom: 0.4rem; }
.login-sub { font-size: 13px; color: var(--muted); font-family: system-ui, sans-serif; margin-bottom: 2rem; }
.login-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 1rem; text-align: left; }
.login-field label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-family: system-ui, sans-serif; }
.login-field input { background: var(--bg2); border: 1px solid var(--faint); border-radius: 6px; color: var(--text); font-size: 14px; font-family: system-ui, sans-serif; padding: 10px 14px; outline: none; width: 100%; }
.login-field input:focus { border-color: var(--accent); }
.btn-login { width: 100%; padding: 12px; background: var(--accent); color: var(--bg); border: none; border-radius: 6px; font-size: 14px; font-weight: 700; font-family: system-ui, sans-serif; cursor: pointer; margin-top: 0.5rem; }
.login-error { margin-top: 10px; font-size: 13px; color: var(--danger); font-family: system-ui, sans-serif; min-height: 20px; }

#admin-screen { display: none; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; border-bottom: 1px solid var(--faint); position: sticky; top: 0; background: var(--bg); z-index: 10; }
.topbar-logo { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); font-family: system-ui, sans-serif; }
.topbar-title { font-size: 14px; color: var(--muted); font-family: system-ui, sans-serif; margin-left: 12px; }
.btn-logout { font-size: 12px; color: var(--muted); background: none; border: 1px solid var(--faint); border-radius: 6px; padding: 5px 12px; cursor: pointer; font-family: system-ui, sans-serif; }

.main { max-width: 680px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
.section-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); font-family: system-ui, sans-serif; margin-bottom: 1.25rem; }
.field { margin-bottom: 1.25rem; }
.field label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-family: system-ui, sans-serif; margin-bottom: 6px; }
.field input, .field select, .field textarea { width: 100%; background: var(--bg2); border: 1px solid var(--faint); border-radius: 6px; color: var(--text); font-size: 14px; font-family: system-ui, sans-serif; padding: 10px 14px; outline: none; resize: vertical; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
.field textarea { min-height: 90px; line-height: 1.6; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.indice-block { background: var(--bg2); border: 1px solid var(--faint); border-radius: 10px; padding: 1rem; margin-bottom: 10px; }
.indice-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.indice-badge { font-size: 10px; font-family: system-ui, sans-serif; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); background: var(--accent-dim); border: 1px solid var(--accent-border); border-radius: 99px; padding: 2px 10px; }
.btn-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 20px; line-height: 1; padding: 0 4px; font-family: system-ui, sans-serif; }
.indice-fields { display: flex; flex-direction: column; gap: 10px; }
.indice-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.subfield { display: flex; flex-direction: column; gap: 6px; }
.subfield label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-family: system-ui, sans-serif; }
.subfield input, .subfield select { background: var(--bg2); border: 1px solid var(--faint); border-radius: 6px; color: var(--text); font-size: 14px; font-family: system-ui, sans-serif; padding: 10px 14px; outline: none; width: 100%; }
.subfield input:focus, .subfield select:focus { border-color: var(--accent); }
.subfield textarea { background: var(--bg2); border: 1px solid var(--faint); border-radius: 6px; color: var(--text); font-size: 14px; font-family: system-ui, sans-serif; padding: 10px 14px; outline: none; width: 100%; min-height: 80px; resize: vertical; line-height: 1.6; }
.subfield textarea:focus { border-color: var(--accent); }

.btn-add { width: 100%; padding: 10px; background: transparent; border: 1px dashed var(--faint); border-radius: 6px; color: var(--muted); font-size: 13px; font-family: system-ui, sans-serif; cursor: pointer; margin-bottom: 1.5rem; }
.divider { border: none; border-top: 1px solid var(--faint); margin: 2rem 0; }
.btn-publier { width: 100%; padding: 14px; background: var(--accent); color: var(--bg); border: none; border-radius: 6px; font-size: 14px; font-weight: 700; font-family: system-ui, sans-serif; cursor: pointer; }
.btn-publier:disabled { opacity: 0.4; cursor: not-allowed; }
.status { margin-top: 12px; padding: 10px 14px; border-radius: 6px; font-size: 13px; font-family: system-ui, sans-serif; display: none; }
.status.ok   { background: var(--success-dim); color: var(--success); border: 1px solid var(--success); display: block; }
.status.err  { background: var(--danger-dim);  color: var(--danger);  border: 1px solid var(--danger);  display: block; }
.status.load { background: var(--bg3); color: var(--muted); border: 1px solid var(--faint); display: block; }
.cas-count { font-size: 12px; color: var(--muted); font-family: system-ui, sans-serif; margin-bottom: 1.5rem; }
.cas-count b { color: var(--accent); }
</style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Epunda+Slab:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">Diagnosclick</div>
    <h1 class="login-title">Bébouland</h1>
    <p class="login-sub">Accès réservé aux bébous</p>
    <div class="login-field">
      <label>Token GitHub</label>
      <input type="password" id="input-token" placeholder="ghp_...">
    </div>
    <button class="btn-login" id="btn-login">Connexion</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="admin-screen">
  <div class="topbar">
    <div style="display:flex;align-items:center">
      <a href="../"><span class="topbar-logo">Diagnosclick</span></a>
      <span class="topbar-title">/ Nouveau cas</span>
    </div>
    <button class="btn-logout" id="btn-logout">Déconnexion</button>
  </div>
  <div class="main">
    <div class="section-label">Informations générales</div>
    <div class="field">
      <label>Diagnostic (réponse exacte)</label>
      <input type="text" id="f-diagnostic" placeholder="ex : Embolie pulmonaire">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Spécialité</label>
        <select id="f-specialite">
          <option value="cardiologie">Cardiologie</option>
          <option value="urgences">Urgences</option>
          <option value="pneumologie">Pneumologie</option>
          <option value="neurologie">Neurologie</option>
          <option value="medecine-interne">Medecine interne</option>
          <option value="gastroenterologie">Gastroenterologie</option>
          <option value="infectiologie">Infectiologie</option>
          <option value="rhumatologie">Rhumatologie</option>
          <option value="endocrinologie">Endocrinologie</option>
          <option value="nephrologie">Nephrologie</option>
          <option value="hematologie">Hematologie</option>
          <option value="oncologie">Oncologie</option>
          <option value="pediatrie">Pédiatrie</option>
          <option value="gynecologie">Gynécologie</option>                    
        </select>
      </div>
      <div class="field">
        <label>Difficulté</label>
        <select id="f-difficulte">
          <option value="1">Facile</option>
          <option value="2" selected>Moyen</option>
          <option value="3">Difficile</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Explication post-partie</label>
      <textarea id="f-explication" placeholder="Résume des élements clés du diagnostic..."></textarea>
    </div>
    <hr class="divider">
    <div class="section-label">Indices (6 maximum)</div>
    <div id="indices-container"></div>
    <button class="btn-add" id="btn-add-indice">+ Ajouter un indice</button>
    <hr class="divider">
    <div class="section-label">Constantes (optionnel)</div>
    <div class="field">
      <label>Disponible a partir de l'indice</label>
      <select id="f-constantes-seuil">
        <option value="">Pas de constantes</option>
        <option value="1">Indice 1</option>
        <option value="2">Indice 2</option>
        <option value="3" selected>Indice 3</option>
        <option value="4">Indice 4</option>
        <option value="5">Indice 5</option>
        <option value="6">Indice 6</option>
      </select>
    </div>
    <div id="constantes-fields">
      <div class="field"><label>FC</label><input type="text" id="c-FC" placeholder="ex : 94 bpm"></div>
      <div class="field-row">
        <div class="field"><label>PA</label><input type="text" id="c-PA" placeholder="ex : 120/80 mmHg"></div>
        <div class="field"><label>SpO2</label><input type="text" id="c-SpO2" placeholder="ex : 97%"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>FR</label><input type="text" id="c-FR" placeholder="ex : 18/min"></div>
        <div class="field"><label>Temperature</label><input type="text" id="c-Temp" placeholder="ex : 38.2 C"></div>
      </div>
      <div class="field"><label>Autres (nom : valeur, séparés par des virgules)</label><input type="text" id="c-autres" placeholder="ex : Glasgow : 15, Glycemie : 7.2 mmol/L"></div>
    </div>
    <hr class="divider">
    <div class="section-label">Publication</div>
    <div class="cas-count" id="cas-count">Chargement du corpus...</div>
    <button class="btn-publier" id="btn-publier">Publier le cas</button>
    <div class="status" id="status"></div>
  </div>
</div>

<script>
var OWNER  = 'syssans';
var REPO   = 'Diagnosclick';
var FILE   = 'diagnosclick_database.json';
var BRANCH = 'main';
var token  = '';
var sha    = '';
var data   = [];
var count  = 0;

function el(id) { return document.getElementById(id); }

function setStatus(type, msg) {
  var s = el('status');
  s.className = 'status ' + type;
  s.textContent = msg;
}

el('btn-login').addEventListener('click', function() {
  var t = el('input-token').value.trim();
  if (!t) { el('login-error').textContent = 'Entre ton token GitHub.'; return; }
  token = t;
  el('login-error').textContent = '';
  el('login-screen').style.display = 'none';
  el('admin-screen').style.display = 'block';
  charger();
  ajouterIndice();
});

el('input-token').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { el('btn-login').click(); }
});

el('btn-logout').addEventListener('click', function() {
  token = '';
  el('admin-screen').style.display = 'none';
  el('login-screen').style.display = 'flex';
  el('input-token').value = '';
});

function charger() {
  var url = 'https://api.github.com/repos/' + OWNER + '/' + REPO + '/contents/' + FILE + '?ref=' + BRANCH;
  fetch(url, {
    headers: {
      'Authorization': 'token ' + token,
      'Accept': 'application/vnd.github.v3+json'
    }
  })
  .then(function(r) { return r.json(); })
  .then(function(j) {
    sha = j.sha;
    var b64 = j.content.replace(/\n/g, '');
    var bin = atob(b64);
    var bytes2 = new Uint8Array(bin.length);
    for (var i2 = 0; i2 < bin.length; i2++) { bytes2[i2] = bin.charCodeAt(i2); }
    data = JSON.parse(new TextDecoder('utf-8').decode(bytes2));
    el('cas-count').innerHTML = 'Corpus : <b>' + data.length + ' cas</b> — ce cas sera le n&deg;' + (data.length + 1);
  })
  .catch(function() {
    el('cas-count').textContent = 'Impossible de charger le corpus. Verifie ton token.';
  });
}

el('btn-add-indice').addEventListener('click', ajouterIndice);

el('f-constantes-seuil').addEventListener('change', function() {
  el('constantes-fields').style.display = this.value ? 'block' : 'none';
});

function collecterConstantes() {
  var seuil = el('f-constantes-seuil').value;
  if (!seuil) return null;
  var valeurs = {};
  var fc = el('c-FC').value.trim(); if (fc) valeurs['FC'] = fc;
  var pa = el('c-PA').value.trim(); if (pa) valeurs['PA'] = pa;
  var spo2 = el('c-SpO2').value.trim(); if (spo2) valeurs['SpO2'] = spo2;
  var fr = el('c-FR').value.trim(); if (fr) valeurs['FR'] = fr;
  var temp = el('c-Temp').value.trim(); if (temp) valeurs['Temperature'] = temp;
  var autres = el('c-autres').value.trim();
  if (autres) {
    autres.split(',').forEach(function(pair) {
      var parts = pair.split(':');
      if (parts.length >= 2) {
        var k = parts[0].trim();
        var v = parts.slice(1).join(':').trim();
        if (k && v) valeurs[k] = v;
      }
    });
  }
  if (!Object.keys(valeurs).length) return null;
  return { disponible_a_partir_de: parseInt(seuil), valeurs: valeurs };
}

function ajouterIndice() {
  if (count >= 6) return;
  count++;
  var n = count;

  var block = document.createElement('div');
  block.className = 'indice-block';
  block.id = 'indice-' + n;

  var header = document.createElement('div');
  header.className = 'indice-header';

  var badge = document.createElement('span');
  badge.className = 'indice-badge';
  badge.textContent = 'Indice ' + n;
  header.appendChild(badge);

  if (n > 1) {
    var btnRm = document.createElement('button');
    btnRm.className = 'btn-remove';
    btnRm.textContent = 'x';
    btnRm.setAttribute('data-n', String(n));
    btnRm.addEventListener('click', function() {
      var num = this.getAttribute('data-n');
      var b = document.getElementById('indice-' + num);
      if (b) { b.remove(); }
      count--;
      el('btn-add-indice').style.display = count >= 6 ? 'none' : 'block';
    });
    header.appendChild(btnRm);
  }

  block.appendChild(header);

  var fields = document.createElement('div');
  fields.className = 'indice-fields';

  var row = document.createElement('div');
  row.className = 'indice-row';

  var sf1 = document.createElement('div');
  sf1.className = 'subfield';
  var l1 = document.createElement('label');
  l1.textContent = 'Type';
  var sel = document.createElement('select');
  sel.id = 'type-' + n;
  var types = ['anamnese', 'clinique', 'paraclinique', 'image'];
  var labels = ['Anamnese', 'Clinique', 'Paraclinique', 'Imagerie'];
  for (var i = 0; i < types.length; i++) {
    var o = document.createElement('option');
    o.value = types[i];
    o.textContent = labels[i];
    sel.appendChild(o);
  }
  sf1.appendChild(l1);
  sf1.appendChild(sel);

  var sf2 = document.createElement('div');
  sf2.className = 'subfield';
  var l2 = document.createElement('label');
  l2.textContent = 'Image (optionnel)';
  var imgInput = document.createElement('input');
  imgInput.type = 'text';
  imgInput.id = 'image-' + n;
  imgInput.placeholder = 'cardio-011-ecg.jpg';
  sf2.appendChild(l2);
  sf2.appendChild(imgInput);

  row.appendChild(sf1);
  row.appendChild(sf2);

  var sf3 = document.createElement('div');
  sf3.className = 'subfield';
  var l3 = document.createElement('label');
  l3.textContent = 'Texte de l\'indice';
  var ta = document.createElement('textarea');
  ta.id = 'texte-' + n;
  ta.placeholder = 'Description, resultat, contexte...';
  sf3.appendChild(l3);
  sf3.appendChild(ta);

  fields.appendChild(row);
  fields.appendChild(sf3);
  block.appendChild(fields);

  el('indices-container').appendChild(block);
  el('btn-add-indice').style.display = count >= 6 ? 'none' : 'block';
}

el('btn-publier').addEventListener('click', function() {
  var diagnostic  = el('f-diagnostic').value.trim();
  var specialite  = el('f-specialite').value;
  var difficulte  = parseInt(el('f-difficulte').value);
  var explication = el('f-explication').value.trim();

  if (!diagnostic) { setStatus('err', 'Le diagnostic est obligatoire.'); return; }

  var blocks = el('indices-container').querySelectorAll('.indice-block');
  if (!blocks.length) { setStatus('err', 'Ajoute au moins un indice.'); return; }

  var indices = [];
  var ok = true;
  for (var i = 0; i < blocks.length; i++) {
    var blockId = blocks[i].id.replace('indice-', '');
    var typeEl  = document.getElementById('type-' + blockId);
    var imageEl = document.getElementById('image-' + blockId);
    var texteEl = document.getElementById('texte-' + blockId);
    if (!texteEl || !texteEl.value.trim()) {
      setStatus('err', 'Indice ' + (i + 1) + ' est vide.');
      ok = false;
      break;
    }
    indices.push({
      ordre: i + 1,
      type: typeEl ? typeEl.value : 'anamnese',
      texte: texteEl.value.trim(),
      image: imageEl && imageEl.value.trim() ? imageEl.value.trim() : null
    });
  }

  if (!ok) return;

  var abbr = {
    cardiologie: 'cardio', urgences: 'urg', pneumologie: 'pneumo',
    neurologie: 'neuro', 'medecine-interne': 'med', gastroenterologie: 'gastro',
    infectiologie: 'infect', rhumatologie: 'rhumato', endocrinologie: 'endo',
    nephrologie: 'nephro', hematologie: 'hemato', oncologie: 'onco', pediatrie: 'ped',
    gynecologie: 'gyn'
  };
  var prefix = abbr[specialite] || specialite;
  var num = String(data.length + 1);
  while (num.length < 3) { num = '0' + num; }
  var id = prefix + '-' + num;

  var newCas = {
    id: id,
    specialite: specialite,
    difficulte: difficulte,
    diagnostic: diagnostic,
    constantes: collecterConstantes(),
    indices: indices,
    explication: explication,
    references: []
  };

  var newData = data.slice();
  newData.push(newCas);

  var jsonStr = JSON.stringify(newData, null, 2);
  var bytes = new TextEncoder().encode(jsonStr);
  var binary = '';
  bytes.forEach(function(b) { binary += String.fromCharCode(b); });
  var content = btoa(binary);

  el('btn-publier').disabled = true;
  setStatus('load', 'Publication en cours...');

  fetch('https://api.github.com/repos/' + OWNER + '/' + REPO + '/contents/' + FILE, {
    method: 'PUT',
    headers: {
      'Authorization': 'token ' + token,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      message: 'Ajout : ' + diagnostic,
      content: content,
      sha: sha,
      branch: BRANCH
    })
  })
  .then(function(r) {
    if (!r.ok) {
      return r.json().then(function(e) { throw new Error(e.message || 'Erreur GitHub'); });
    }
    return r.json();
  })
  .then(function(j) {
    data = newData;
    sha = j.content.sha;
    setStatus('ok', 'Cas publié avec succès. Corpus : ' + data.length + ' cas.');
    el('cas-count').innerHTML = 'Corpus : <b>' + data.length + ' cas</b> — ce cas sera le n&deg;' + (data.length + 1);
    reset();
  })
  .catch(function(e) {
    setStatus('err', 'Erreur : ' + e.message);
  })
  .finally(function() {
    el('btn-publier').disabled = false;
  });
});

function reset() {
  el('f-diagnostic').value = '';
  el('f-explication').value = '';
  el('f-specialite').value = 'cardiologie';
  el('f-difficulte').value = '2';
  el('f-constantes-seuil').value = '3';
  el('c-FC').value = ''; el('c-PA').value = ''; el('c-SpO2').value = '';
  el('c-FR').value = ''; el('c-Temp').value = ''; el('c-autres').value = '';
  el('constantes-fields').style.display = 'block';
  el('indices-container').innerHTML = '';
  count = 0;
  ajouterIndice();
  el('btn-add-indice').style.display = 'block';
  el('status').className = 'status';
}
</script>
</body>
</html>
