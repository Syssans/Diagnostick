* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Georgia', serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}

/* ── LOGIN ── */
#login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}

.login-card {
  width: 100%;
  max-width: 360px;
  text-align: center;
}

.login-logo {
  font-size: 13px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 2rem;
}

.login-title {
  font-size: 22px;
  font-weight: normal;
  margin-bottom: 0.4rem;
  color: var(--text);
}

.login-sub {
  font-size: 13px;
  color: var(--muted);
  font-family: system-ui, sans-serif;
  margin-bottom: 2rem;
}

.login-field {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 1rem;
  text-align: left;
}

.login-field label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  font-family: system-ui, sans-serif;
}

.login-field input {
  background: var(--bg2);
  border: 0.5px solid var(--faint);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 14px;
  font-family: system-ui, sans-serif;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.15s;
  width: 100%;
}

.login-field input:focus { border-color: var(--accent-border); }
.login-field input::placeholder { color: var(--muted); }

.btn-login {
  width: 100%;
  padding: 11px;
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.05em;
  font-family: system-ui, sans-serif;
  cursor: pointer;
  transition: opacity 0.15s;
  margin-top: 0.5rem;
}

.btn-login:hover { opacity: 0.85; }

.login-error {
  margin-top: 10px;
  font-size: 13px;
  color: var(--danger);
  font-family: system-ui, sans-serif;
  min-height: 20px;
}

/* ── ADMIN ── */
#admin-screen { display: none; }

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 1.5rem;
  border-bottom: 0.5px solid var(--faint);
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 10;
}

.topbar-left { display: flex; align-items: center; gap: 12px; }
.topbar-logo { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); }
.topbar-sep { width: 0.5px; height: 16px; background: var(--faint); }
.topbar-title { font-size: 14px; color: var(--muted); font-family: system-ui, sans-serif; }

.btn-logout {
  font-size: 12px;
  color: var(--muted);
  background: none;
  border: 0.5px solid var(--faint);
  border-radius: var(--radius-sm);
  padding: 5px 12px;
  cursor: pointer;
  font-family: system-ui, sans-serif;
  transition: all 0.1s;
}
.btn-logout:hover { color: var(--text); border-color: var(--muted); }

.main { max-width: 680px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

/* SECTION TITRE */
.section-label {
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent);
  font-family: system-ui, sans-serif;
  margin-bottom: 1.25rem;
}

/* CHAMPS */
.field { margin-bottom: 1.25rem; }

.field label {
  display: block;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  font-family: system-ui, sans-serif;
  margin-bottom: 6px;
}

.field input,
.field select,
.field textarea {
  width: 100%;
  background: var(--bg2);
  border: 0.5px solid var(--faint);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 14px;
  font-family: system-ui, sans-serif;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.15s;
  resize: vertical;
}

.field input:focus,
.field select:focus,
.field textarea:focus { border-color: var(--accent-border); }
.field input::placeholder,
.field textarea::placeholder { color: var(--muted); }

.field select { appearance: none; cursor: pointer; }
.field textarea { min-height: 90px; line-height: 1.6; }

.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* INDICES */
.indices-section { margin-bottom: 1.5rem; }

.indice-block {
  background: var(--bg2);
  border: 0.5px solid var(--faint);
  border-radius: var(--radius);
  padding: 1rem;
  margin-bottom: 10px;
  position: relative;
  transition: border-color 0.15s;
}

.indice-block:focus-within { border-color: var(--accent-border); }

.indice-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.indice-num-badge {
  font-size: 10px;
  font-family: system-ui, sans-serif;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--accent);
  background: var(--accent-dim);
  border: 0.5px solid var(--accent-border);
  border-radius: 99px;
  padding: 2px 10px;
}

.btn-remove-indice {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 18px;
  line-height: 1;
  padding: 0 4px;
  transition: color 0.1s;
}
.btn-remove-indice:hover { color: var(--danger); }

.indice-fields { display: flex; flex-direction: column; gap: 10px; }

.indice-type-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* BOUTONS */
.btn-add-indice {
  width: 100%;
  padding: 10px;
  background: transparent;
  border: 0.5px dashed var(--faint);
  border-radius: var(--radius-sm);
  color: var(--muted);
  font-size: 13px;
  font-family: system-ui, sans-serif;
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 1.5rem;
}
.btn-add-indice:hover { border-color: var(--accent-border); color: var(--accent); }

.divider { border: none; border-top: 0.5px solid var(--faint); margin: 2rem 0; }

.btn-publier {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.05em;
  font-family: system-ui, sans-serif;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn-publier:hover { opacity: 0.85; }
.btn-publier:disabled { opacity: 0.4; cursor: not-allowed; }

/* STATUS */
.status-bar {
  margin-top: 12px;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-family: system-ui, sans-serif;
  display: none;
}
.status-bar.loading { background: var(--bg3); color: var(--muted); border: 0.5px solid var(--faint); display: block; }
.status-bar.success { background: var(--success-dim); color: var(--success); border: 0.5px solid var(--success); display: block; }
.status-bar.error   { background: var(--danger-dim);  color: var(--danger);  border: 0.5px solid var(--danger);  display: block; }

/* COMPTEUR */
.cas-count {
  font-size: 12px;
  color: var(--muted);
  font-family: system-ui, sans-serif;
  margin-bottom: 1.5rem;
}
.cas-count span { color: var(--accent); font-weight: 600; }

<script>
  // ── CONFIG ────────────────────────────────────────────────────────────────
  const REPO_OWNER = 'syssans';
  const REPO_NAME  = 'Diagnostick';
  const DB_PATH    = 'diagnostick_database.json';
  const BRANCH     = 'main';

  let githubToken = '';

  // ── AUTH ──────────────────────────────────────────────────────────────────
  document.getElementById('btn-login').addEventListener('click', () => {
    const token = document.getElementById('input-token').value.trim();
    const err   = document.getElementById('login-error');

    if (!token) { err.textContent = 'Entre ton token GitHub.'; return; }

    githubToken = token;
    err.textContent = '';
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    chargerCorpus();
    ajouterIndice();
  });

  document.getElementById('input-token').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btn-login').click();
  });

  document.getElementById('btn-logout').addEventListener('click', () => {
    githubToken = '';
    document.getElementById('admin-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('input-token').value = '';
  });

  // ── CORPUS ────────────────────────────────────────────────────────────────
  let currentSha = '';
  let currentData = [];

  async function chargerCorpus() {
    const el = document.getElementById('cas-count');
    try {
      const res = await fetch(
        `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DB_PATH}?ref=${BRANCH}`,
        { headers: { Authorization: `token ${githubToken}`, Accept: 'application/vnd.github.v3+json' } }
      );
      const json = await res.json();
      currentSha  = json.sha;
      currentData = JSON.parse(atob(json.content.replace(/\n/g, '')));
      el.innerHTML = `Corpus actuel : <span>${currentData.length} cas</span> — ce nouveau cas sera le n°${currentData.length + 1}`;
    } catch {
      el.textContent = 'Impossible de charger le corpus. Vérifie le token.';
    }
  }

  // ── INDICES ───────────────────────────────────────────────────────────────
  let indiceCount = 0;

  function ajouterIndice() {
    if (indiceCount >= 6) return;
    indiceCount++;
    const n = indiceCount;

    const block = document.createElement('div');
    block.className = 'indice-block';
    block.dataset.n = n;
    block.innerHTML = `
      <div class="indice-header">
        <span class="indice-num-badge">Indice ${n}</span>
        ${n > 1 ? `<button class="btn-remove-indice" data-n="${n}" title="Supprimer">×</button>` : ''}
      </div>
      <div class="indice-fields">
        <div class="indice-type-row">
          <div class="field" style="margin:0">
            <label>Type</label>
            <select id="type-${n}">
              <option value="anamnese">Anamnèse</option>
              <option value="clinique">Clinique</option>
              <option value="paraclinique">Paraclinique</option>
              <option value="image">Imagerie</option>
            </select>
          </div>
          <div class="field" style="margin:0">
            <label>Fichier image (optionnel)</label>
            <input type="text" id="image-${n}" placeholder="ex : cardio-011-ecg.jpg" />
          </div>
        </div>
        <div class="field" style="margin:0">
          <label>Texte de l'indice</label>
          <textarea id="texte-${n}" placeholder="Description clinique, résultat, contexte..."></textarea>

```

  </div>
`;

block.querySelector('.btn-remove-indice')?.addEventListener('click', () => {

  indiceCount--;

function renuméroterIndices() {
document.querySelectorAll(’.indice-block’).forEach((block, i) => {
const n = i + 1;
block.dataset.n = n;
block.querySelector(’.indice-num-badge’).textContent = `Indice ${n}`;
block.querySelector(‘select’)?.setAttribute(‘id’, `type-${n}`);
block.querySelector(‘input[type=text]’)?.setAttribute(‘id’, `image-${n}`);
block.querySelector(‘textarea’)?.setAttribute(‘id’, `texte-${n}`);
});
indiceCount = document.querySelectorAll(’.indice-block’).length;
}

document.getElementById(‘btn-add-indice’).addEventListener(‘click’, ajouterIndice);

// ── PUBLICATION ───────────────────────────────────────────────────────────
function genId(specialite, index) {
const abbr = { cardiologie:‘cardio’, urgences:‘urg’, pneumologie:‘pneumo’,
neurologie:‘neuro’, ‘medecine-interne’:‘med’, gastroenterologie:‘gastro’,
infectiologie:‘infect’, rhumatologie:‘rhumato’, endocrinologie:‘endo’,
nephrologie:‘nephro’, hematologie:‘hemato’, oncologie:‘onco’ };
const prefix = abbr[specialite] || specialite;
return `${prefix}-${String(index).padStart(3,'0')}`;
}

function setStatus(type, msg) {
const el = document.getElementById(‘status-bar’);
el.className = `status-bar ${type}`;
el.textContent = msg;
}

document.getElementById(‘btn-publier’).addEventListener(‘click’, async () => {
const diagnostic  = document.getElementById(‘f-diagnostic’).value.trim();
const specialite  = document.getElementById(‘f-specialite’).value;
const difficulte  = parseInt(document.getElementById(‘f-difficulte’).value);
const explication = document.getElementById(‘f-explication’).value.trim();

```
if (!diagnostic) { setStatus('error', 'Le diagnostic est obligatoire.'); return; }

const blocks = document.querySelectorAll('.indice-block');
if (blocks.length === 0) { setStatus('error', 'Ajoute au moins un indice.'); return; }

const indices = [];
let valid = true;
blocks.forEach((block, i) => {
  const n = i + 1;
  const texte = document.getElementById(`texte-${n}`)?.value.trim();
  const type  = document.getElementById(`type-${n}`)?.value;
  const image = document.getElementById(`image-${n}`)?.value.trim() || null;
  if (!texte) { setStatus('error', `L'indice ${n} est vide.`); valid = false; }
  indices.push({ ordre: n, type, texte, image });
});

if (!valid) return;

const btn = document.getElementById('btn-publier');
btn.disabled = true;
setStatus('loading', 'Publication en cours...');

const newId  = genId(specialite, currentData.length + 1);
const newCas = { id: newId, specialite, difficulte, diagnostic, indices, explication, references: [] };
const newData = [...currentData, newCas];
const newContent = btoa(unescape(encodeURIComponent(JSON.stringify(newData, null, 2))));

try {
  const res = await fetch(
    `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DB_PATH}`,
    {
      method: 'PUT',
      headers: {
        Authorization: `token ${githubToken}`,
        Accept: 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: `Ajout du cas : ${diagnostic}`,
        content: newContent,
        sha: currentSha,
        branch: BRANCH
      })
    }
  );

  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.message || 'Erreur GitHub');
  }

  currentData = newData;
  const newJson = await res.json();
  currentSha = newJson.content.sha;

  setStatus('success', `Cas "${diagnostic}" publié avec succès — corpus : ${currentData.length} cas.`);
  document.getElementById('cas-count').innerHTML = `Corpus actuel : <span>${currentData.length} cas</span> — ce nouveau cas sera le n°${currentData.length + 1}`;
  resetForm();

} catch (e) {
  setStatus('error', `Erreur : ${e.message}`);
} finally {
  btn.disabled = false;
}
```

function resetForm() {

document.getElementById(‘f-explication’).value = ‘’;
document.getElementById(‘f-specialite’).value = ‘cardiologie’;
document.getElementById(‘f-difficulte’).value = ‘2’;
document.getElementById(‘indices-container’).innerHTML = ‘’;
indiceCount = 0;
ajouterIndice();
document.getElementById(‘btn-add-indice’).style.display = ‘block’;
