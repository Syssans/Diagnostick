<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diagnosclick</title>
  <meta name="description" content="Trouvez le diagnostic medical en 6 indices. Un nouveau cas chaque jour." />
  <link rel="stylesheet" href="./style/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦧</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Epunda+Slab:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
  <style>
    #app { max-width:800px; margin:0 auto; padding:2rem 1rem 3rem; }
  </style>
</head>
<body>

<div id="app">
  <div class="header">
    <h1>Diagnosclick</h1>
    <p class="header-sub"><span id="date-label"></span></p>
    <div class="header-nav">
      <button class="btn-page" id="btn-page" onclick="window.location.href = './archives';">Archives</button>
    </div>
    <div class="header-stats">
      <div class="stat"><div class="stat-value" id="stat-joues">0</div><div class="stat-label">Joués</div></div>
      <div class="stat"><div class="stat-value" id="stat-reussis">0%</div><div class="stat-label">Réussite</div></div>
      <div class="stat"><div class="stat-value" id="stat-streak">0</div><div class="stat-label">Série</div></div>
    </div>
  </div>

  <div id="game-container">
    <div class="tries" id="tries-row"></div>
    <div class="indices" id="indices-container"></div>

    <div class="constantes-zone" id="constantes-zone" style="display:none;">
      <button class="btn-constantes" id="btn-constantes" disabled>
        <span class="btn-constantes-left">
<svg width="32" height="32" viewBox="0 0 24 24" fill="none">
        <path d="M2 12 L5 12 L7 7 L9 17 L11 10 L13 14 L15 12 L22 12"
              stroke="#ef4444" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>          <span id="constantes-btn-label">Constantes</span>
        </span>
        <span class="constantes-chevron" id="constantes-chevron">&#9660;</span>
      </button>
      <div class="constantes-panel" id="constantes-panel">
        <table class="constantes-table" id="constantes-table"></table>
      </div>
    </div>

    <div class="input-zone" id="input-zone">
      <div class="input-row">
        <input class="diag-input" id="diag-input" type="text" placeholder="Votre diagnostic ?" autocomplete="off" />
        <button class="btn-passer" id="btn-passer">Passer</button>
        <button class="btn-valider" id="btn-valider">Valider</button>
      </div>
      <div class="dropdown" id="dropdown" style="display:none;"></div>
      <div id="feedback"></div>
    </div>
    <div id="result-zone"></div>
  </div>

  <div class="footer">
    <p><i>Diagnosclick ne se substitue en aucun cas à un avis médical professionnel.</i></p>
    <p style="margin-top:6px;"><a href="https://x.com/syssans" target="_blank">@Syssans</a></p>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightbox-close">&#215;</button>
  <img id="lightbox-img" src="" alt="Imagerie agrandie" />
</div>

<script>
  var DIAGNOSTICS = [
    "Embolie pulmonaire","Pneumothorax spontane","Pneumonie franche lobaire aigue",
    "Pleuresia","Angor instable","Epanchement pericardique","Exacerbation de BPCO",
    "Crise d'asthme","Pneumopathie interstitielle"
  ];

  var CAS = null;
  var essaiActuel = 0;
  var indicesVisibles = 1;
  var termine = false;
  var countdownInterval = null;
  var MAX_ESSAIS = 6;
  var KEY_STATS   = 'diagnosclick_stats';
  var KEY_SESSION = 'diagnosclick_session';

  function el(id) { return document.getElementById(id); }

  function getTodayKey() {
    var d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function getDateLabel() {
    return new Date().toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' });
  }

  function secondsUntilMidnight() {
    var now = new Date(), midnight = new Date(now);
    midnight.setHours(24,0,0,0);
    return Math.floor((midnight - now) / 1000);
  }

  function formatCountdown(s) {
    return String(Math.floor(s/3600)).padStart(2,'0') + ':' + String(Math.floor((s%3600)/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
  }

  function getStats() {
    try { return JSON.parse(localStorage.getItem(KEY_STATS)) || {joues:0,reussis:0,streak:0,lastDate:null}; }
    catch(e) { return {joues:0,reussis:0,streak:0,lastDate:null}; }
  }
  function saveStats(s) { try { localStorage.setItem(KEY_STATS, JSON.stringify(s)); } catch(e) {} }

  function updateStats(succes) {
    var stats = getStats();
    var d = new Date(); d.setDate(d.getDate()-1);
    var yesterday = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    stats.joues++;
    if (succes) { stats.reussis++; stats.streak = stats.lastDate === yesterday ? stats.streak+1 : 1; }
    else { stats.streak = 0; }
    stats.lastDate = getTodayKey();
    saveStats(stats); renderStats();
  }

  function renderStats() {
    var s = getStats();
    el('stat-joues').textContent = s.joues;
    el('stat-reussis').textContent = s.joues > 0 ? Math.round(s.reussis/s.joues*100)+'%' : '0%';
    el('stat-streak').textContent = s.streak;
  }

  function getSession() { try { return JSON.parse(localStorage.getItem(KEY_SESSION)) || null; } catch(e) { return null; } }
  function saveSession(d) { try { localStorage.setItem(KEY_SESSION, JSON.stringify(d)); } catch(e) {} }

  function joursDepuis(dateStr) {
    var start = new Date(dateStr); start.setHours(0,0,0,0);
    var today = new Date(); today.setHours(0,0,0,0);
    return Math.floor((today - start) / 86400000);
  }

  function getCasDuJour(data, config) {
    var offset = joursDepuis(config.start_date);
    var index = (config.start_index + offset) % data.length;
    return { cas: data[index], index: index };
  }

  function transformerCas(raw) {
    return {
      diagnostic: raw.diagnostic,
      constantes: raw.constantes || null,
      indices: raw.indices.slice().sort(function(a,b){return a.ordre-b.ordre;}).map(function(ind){
        return { type:ind.type, text:ind.texte, hasImage:ind.image!==null, imageSrc:ind.image||null };
      })
    };
  }

  function chargerCas() {
    Promise.all([
      fetch('./diagnosclick_database.json').then(function(r){return r.json();}),
      fetch('./config.json').then(function(r){return r.json();})
    ]).then(function(results) {
      var data = results[0], config = results[1];
      data.forEach(function(c){ if(DIAGNOSTICS.indexOf(c.diagnostic)===-1) DIAGNOSTICS.push(c.diagnostic); });
      CAS = transformerCas(getCasDuJour(data, config).cas);
      var session = getSession();
      if (session && session.date === getTodayKey()) { afficherDejaJoue(session); return; }
      renderTries(); renderIndices(false); renderConstantes();
    }).catch(function() {
      renderTries(); renderIndices(false); renderConstantes();
    });
  }

  // ── CONSTANTES ──
  function renderConstantes() {
    if (!CAS || !CAS.constantes) { el('constantes-zone').style.display='none'; return; }
    el('constantes-zone').style.display='block';
    mettreAJourConstantes();
  }

  function mettreAJourConstantes() {
    if (!CAS || !CAS.constantes) return;
    var seuil = CAS.constantes.disponible_a_partir_de;
    var btn = el('btn-constantes');
    if (indicesVisibles >= seuil || termine) {
      btn.disabled = false;
      el('constantes-btn-label').textContent = 'Constantes';
    } else {
      btn.disabled = true;
      el('constantes-btn-label').textContent = 'Constantes — disponibles à l\'indice ' + seuil;
    }
  }

  el('btn-constantes').addEventListener('click', function() {
    if (this.disabled) return;
    var panel = el('constantes-panel'), chevron = el('constantes-chevron');
    if (panel.classList.contains('open')) {
      panel.classList.remove('open'); chevron.classList.remove('open');
    } else {
      var table = el('constantes-table'); table.innerHTML = '';
      Object.keys(CAS.constantes.valeurs).forEach(function(k) {
        var tr = document.createElement('tr');
        var td1 = document.createElement('td'); td1.textContent = k;
        var td2 = document.createElement('td'); td2.textContent = CAS.constantes.valeurs[k];
        tr.appendChild(td1); tr.appendChild(td2); table.appendChild(tr);
      });
      panel.classList.add('open'); chevron.classList.add('open');
    }
  });

  // ── LIGHTBOX ──
  function ouvrirLightbox(src) {
    el('lightbox-img').src = src;
    el('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function fermerLightbox() {
    el('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }
  el('lightbox-close').addEventListener('click', fermerLightbox);
  el('lightbox').addEventListener('click', function(e) { if (e.target === this) fermerLightbox(); });
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') fermerLightbox(); });

  // ── RENDU ──
  function renderTries() {
    var row = el('tries-row'); row.innerHTML = '';
    for (var i = 0; i < MAX_ESSAIS; i++) {
      var dot = document.createElement('div');
      dot.className = 'try-dot' + (i < essaiActuel ? ' used' : i === essaiActuel ? ' current' : '');
      dot.textContent = i+1; row.appendChild(dot);
    }
  }

  function getTag(type) {
    return ({anamnese:{cls:'tag-anamnese',label:'Anamnèse'},clinique:{cls:'tag-clinique',label:'Clinique'},paraclinique:{cls:'tag-paraclinique',label:'Paraclinique'},image:{cls:'tag-image',label:'Imagerie'}})[type] || {cls:'tag-anamnese',label:type};
  }

  function creerCarteIndice(ind, i, animer) {
  var tag = getTag(ind.type);
  var card = document.createElement('div');
  card.className = animer ? 'indice-card' : 'indice-card no-anim';
  card.dataset.indice = i;
  var header = document.createElement('div'); header.className = 'indice-header';
  var tagEl = document.createElement('span'); tagEl.className = 'indice-tag ' + tag.cls; tagEl.textContent = tag.label;
  var numEl = document.createElement('span'); numEl.className = 'indice-num'; numEl.textContent = 'Indice ' + (i+1);
  header.appendChild(tagEl); header.appendChild(numEl);
  var textEl = document.createElement('div'); textEl.className = 'indice-text'; textEl.textContent = ind.text;
  card.appendChild(header); card.appendChild(textEl);
  if (ind.hasImage) {
    var imgDiv = document.createElement('div'); imgDiv.className = 'indice-image';
    if (ind.imageSrc) {
      var img = document.createElement('img'); img.src = './images/' + ind.imageSrc; img.alt = 'Imagerie';
      var hint = document.createElement('span'); hint.className = 'indice-image-hint'; hint.textContent = 'Appuyer pour agrandir';
      imgDiv.appendChild(img); imgDiv.appendChild(hint);
      imgDiv.addEventListener('click', function() { ouvrirLightbox('./images/' + ind.imageSrc); });
    } else {
      var sp = document.createElement('span'); sp.className = 'indice-image-placeholder'; sp.textContent = 'Image à venir';
      imgDiv.appendChild(sp); imgDiv.style.cursor = 'default';
    }
    card.appendChild(imgDiv);
  }
  return card;
}

function creerCarteVerrouille(i) {
  var locked = document.createElement('div'); locked.className = 'indice-locked-card';
  locked.dataset.indice = i;
  locked.innerHTML = '<svg class="lock-icon" viewBox="0 0 16 16" fill="none"><rect x="3" y="7" width="10" height="8" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M5 7V5a3 3 0 016 0v2" stroke="currentColor" stroke-width="1.2"/></svg>';
  var lockTxt = document.createElement('span'); lockTxt.className = 'indice-locked-text'; lockTxt.textContent = 'Indice ' + (i+1);
  locked.appendChild(lockTxt);
  return locked;
}

function renderIndices(animerDernier) {
  if (!CAS) return;
  var container = el('indices-container');
  if (container.children.length === 0) {
    CAS.indices.forEach(function(ind, i) {
      container.appendChild(i < indicesVisibles ? creerCarteIndice(ind, i, false) : creerCarteVerrouille(i));
    });
    mettreAJourConstantes();
    return;
  }
  CAS.indices.forEach(function(ind, i) {
    var existing = container.querySelector('[data-indice="' + i + '"]');
    if (i < indicesVisibles && existing && existing.classList.contains('indice-locked-card')) {
      container.replaceChild(creerCarteIndice(ind, i, animerDernier && i === indicesVisibles - 1), existing);
    }
  });
  mettreAJourConstantes();
}

  function normalise(str) { return str.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,""); }

  function showDropdown(items) {
    var dd = el('dropdown');
    if (!items.length) { dd.style.display='none'; return; }
    dd.innerHTML = '';
    items.forEach(function(item) {
      var div = document.createElement('div'); div.className = 'dropdown-item'; div.textContent = item;
      div.addEventListener('mousedown', function(e) { e.preventDefault(); el('diag-input').value = item; dd.style.display='none'; });
      dd.appendChild(div);
    });
    dd.style.display = 'block';
  }

  function buildEmoji(succes) {
    var r = '';
    for (var i = 0; i < MAX_ESSAIS; i++) r += (i < essaiActuel ? '🟥' : (i === essaiActuel && succes ? '🟩' : '⬜'));
    return r;
  }

  function afficherDejaJoue(session) {
    el('tries-row').style.display='none'; el('indices-container').style.display='none';
    el('constantes-zone').style.display='none'; el('input-zone').style.display='none';
    var emoji = session.emoji || '';
    var zone = el('result-zone');
    var banner = document.createElement('div'); banner.className = 'deja-joue';
    var h2 = document.createElement('h2'); h2.textContent = session.succes ? 'Bravo !' : 'Raté pour aujourd\'hui';
    var emojiDiv = document.createElement('div'); emojiDiv.className = 'result-emoji'; emojiDiv.style.margin='10px 0'; emojiDiv.textContent = emoji;
    var p1 = document.createElement('p');
    p1.innerHTML = session.succes ? 'Trouvé en ' + session.essais + ' essai' + (session.essais>1?'s':'') + ' — <strong>' + session.diagnostic + '</strong>' : 'Le diagnostic était : <strong>' + session.diagnostic + '</strong>';
    var p2 = document.createElement('p'); p2.textContent = 'Vous avez déjà joué aujourd\'hui.';
    var cdBlock = document.createElement('div'); cdBlock.className = 'countdown-block';
    var cdLabel = document.createElement('div'); cdLabel.className = 'countdown-label'; cdLabel.textContent = 'Prochain cas dans';
    var cdTime = document.createElement('div'); cdTime.className = 'countdown-time'; cdTime.id = 'countdown-time'; cdTime.textContent = '--:--:--';
    cdBlock.appendChild(cdLabel); cdBlock.appendChild(cdTime);
    var actions = document.createElement('div'); actions.className = 'result-actions';
    var confirm = document.createElement('div'); confirm.className = 'share-confirm'; confirm.style.display='none'; confirm.textContent = 'Copié !';
    var btnP = document.createElement('button'); btnP.className = 'btn-partager'; btnP.textContent = 'Partager';
    btnP.addEventListener('click', function() { navigator.clipboard.writeText('Diagnosclick — ' + getDateLabel() + '\n' + emoji + '\nhttps://diagnosclick.com').catch(function(){}); confirm.style.display='block'; });
    var lnk = document.createElement('a'); lnk.className = 'btn-archives-link'; lnk.href = './archives'; lnk.textContent = 'Voir les archives';
    actions.appendChild(btnP); actions.appendChild(lnk);
    banner.appendChild(h2); banner.appendChild(emojiDiv); banner.appendChild(p1); banner.appendChild(p2); banner.appendChild(cdBlock); banner.appendChild(actions); banner.appendChild(confirm);
    zone.innerHTML = ''; zone.appendChild(banner);
    startCountdown();
  }

  function startCountdown() {
    function tick() { var e = el('countdown-time'); if (!e) { clearInterval(countdownInterval); return; } e.textContent = formatCountdown(secondsUntilMidnight()); }
    tick(); countdownInterval = setInterval(tick, 1000);
  }

  function terminer(succes) {
    termine = true;
    var emoji = buildEmoji(succes);
    saveSession({ date:getTodayKey(), succes:succes, diagnostic:CAS.diagnostic, essais:essaiActuel+1, emoji:emoji });
    updateStats(succes);
    el('input-zone').style.display = 'none';
    var dots = document.querySelectorAll('.try-dot');
    if (succes && dots[essaiActuel]) { dots[essaiActuel].classList.remove('current'); dots[essaiActuel].classList.add('correct'); }
    indicesVisibles = CAS.indices.length; renderIndices(false); mettreAJourConstantes();
    var zone = el('result-zone');
    var banner = document.createElement('div'); banner.className = 'result-banner';
    var h2 = document.createElement('h2'); h2.textContent = succes ? 'Bravo !' : 'Raté pour aujourd\'hui';
    var emojiDiv = document.createElement('div'); emojiDiv.className = 'result-emoji'; emojiDiv.textContent = emoji;
    var p = document.createElement('p');
    p.innerHTML = succes ? 'Trouvé en ' + (essaiActuel+1) + ' essai' + (essaiActuel>0?'s':'') + ' — <strong>' + CAS.diagnostic + '</strong>' : 'Le diagnostic était : <strong>' + CAS.diagnostic + '</strong>';
    var cdBlock = document.createElement('div'); cdBlock.className = 'countdown-block';
    var cdLabel = document.createElement('div'); cdLabel.className = 'countdown-label'; cdLabel.textContent = 'Prochain cas dans';
    var cdTime = document.createElement('div'); cdTime.className = 'countdown-time'; cdTime.id = 'countdown-time'; cdTime.textContent = '--:--:--';
    cdBlock.appendChild(cdLabel); cdBlock.appendChild(cdTime);
    var actions = document.createElement('div'); actions.className = 'result-actions';
    var confirm = document.createElement('div'); confirm.className = 'share-confirm'; confirm.style.display='none'; confirm.textContent = 'Copié !';
    var btnP = document.createElement('button'); btnP.className = 'btn-partager'; btnP.textContent = 'Partager';
    btnP.addEventListener('click', function() { navigator.clipboard.writeText('Diagnosclick — ' + getDateLabel() + '\n' + emoji + '\nhttps://diagnosclick.com').catch(function(){}); confirm.style.display='block'; });
    var lnk = document.createElement('a'); lnk.className = 'btn-archives-link'; lnk.href = './archives'; lnk.textContent = 'Voir les archives';
    actions.appendChild(btnP); actions.appendChild(lnk);
    banner.appendChild(h2); banner.appendChild(emojiDiv); banner.appendChild(p); banner.appendChild(cdBlock); banner.appendChild(actions); banner.appendChild(confirm);
    zone.innerHTML = ''; zone.appendChild(banner);
    startCountdown();
  }

  function valider() {
    if (termine) return;
    var val = el('diag-input').value.trim(); if (!val) return;
    el('dropdown').style.display = 'none';
    if (normalise(val) === normalise(CAS.diagnostic)) {
      el('feedback').innerHTML = '<div class="feedback correct">Exact — <strong>' + CAS.diagnostic + '</strong>.</div>';
      terminer(true); return;
    }
    el('feedback').innerHTML = '<div class="feedback wrong">Ce n\'est pas le bon diagnostic.</div>';
    el('diag-input').value = ''; essaiActuel++;
    if (essaiActuel >= MAX_ESSAIS) { terminer(false); return; }
    if (indicesVisibles < CAS.indices.length) indicesVisibles++;
    renderTries(); renderIndices(true);
  }

  function passer() {
    if (termine) return;
    el('feedback').innerHTML = '<div class="feedback reveal">Indice suivant</div>';
    el('diag-input').value = ''; el('dropdown').style.display = 'none'; essaiActuel++;
    if (essaiActuel >= MAX_ESSAIS) { terminer(false); return; }
    if (indicesVisibles < CAS.indices.length) indicesVisibles++;
    renderTries(); renderIndices(true);
  }

  el('date-label').textContent = getDateLabel();
  el('diag-input').addEventListener('input', function(e) { var q=normalise(e.target.value); if(q.length<2){el('dropdown').style.display='none';return;} showDropdown(DIAGNOSTICS.filter(function(d){return normalise(d).includes(q);}).slice(0,7)); });
  el('diag-input').addEventListener('blur', function() { setTimeout(function(){el('dropdown').style.display='none';},150); });
  el('diag-input').addEventListener('keydown', function(e) { if(e.key==='Enter') valider(); });
  el('btn-valider').addEventListener('click', valider);
  el('btn-passer').addEventListener('click', passer);

  renderStats();
  chargerCas();
</script>
</body>
</html>
